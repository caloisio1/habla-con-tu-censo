<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habla con tu Censo — Censo 2011 en lenguaje natural</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
  h1 { font-size: 1.4rem; }
  .sub { color: #555; margin-bottom: 24px; }
  form { display: flex; gap: 8px; }
  input { flex: 1; padding: 10px; font-size: 1rem; border: 1px solid #bbb; border-radius: 6px; }
  button { padding: 10px 18px; font-size: 1rem; border: 0; border-radius: 6px; background: #0b5394; color: white; cursor: pointer; }
  #respuesta { margin-top: 24px; padding: 16px; background: #f4f6f8; border-radius: 8px; white-space: pre-wrap; }
  #sql { margin-top: 12px; font-family: monospace; font-size: 0.85rem; color: #666; }
  .ejemplos span { display: inline-block; margin: 4px 6px 0 0; padding: 4px 10px; background: #e8eef4; border-radius: 12px; font-size: 0.85rem; cursor: pointer; }
  #respuesta table { border-collapse: collapse; margin: 8px 0; }
  #respuesta th, #respuesta td { padding: 8px; border: 1px solid #ddd; }
  #respuesta th { background: #f0f0f0; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
</head>
<body>
<h1>Habla con tu Censo</h1>
<p class="sub">Preguntale al Censo 2011 (INE Uruguay) en español. Solo agregados públicos. El SQL ejecutado se muestra siempre.</p>

<form id="f">
  <input id="q" placeholder="¿Cuánta gente vive en Salto?" autofocus>
  <button>Preguntar</button>
</form>

<div class="ejemplos">
  <span>¿Qué departamento tiene más población?</span>
  <span>¿Cuántas mujeres mayores de 75 hay en Rivera?</span>
  <span>Población por tramo de edad en Montevideo</span>
</div>

<div id="respuesta" hidden></div>
<div id="sql"></div>

<script>
const f = document.getElementById('f'), q = document.getElementById('q'),
      r = document.getElementById('respuesta'), s = document.getElementById('sql');

document.querySelectorAll('.ejemplos span').forEach(el =>
  el.onclick = () => { q.value = el.textContent; f.requestSubmit(); });

f.onsubmit = async (e) => {
  e.preventDefault();
  r.hidden = false; r.textContent = 'Consultando…'; s.textContent = '';
  const res = await fetch('preguntar', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({texto: q.value})
  });
  const j = await res.json();
  r.innerHTML = marked.parse(j.respuesta);
  if (j.sql) s.textContent = 'SQL: ' + j.sql;
};
</script>
</body>
</html>
